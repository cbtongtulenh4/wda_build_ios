name: Build WebDriverAgent

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-wda:
    name: Build WebDriverAgent Runner IPA (Unsigned)
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Environment
        id: setup
        run: |
          echo "=== All Xcode Versions ==="
          ls -d /Applications/Xcode*.app 2>/dev/null || true

          echo ""
          echo "=== Current Default Xcode ==="
          xcode-select -p
          xcodebuild -version

          echo ""
          echo "=== Available SDKs ==="
          xcodebuild -showsdks

          echo ""
          echo "=== Available iPhone Simulators ==="
          xcrun simctl list devices available | grep -i "iphone"

          echo ""
          echo "=== Finding a Simulator to Use ==="
          # Get the first available iPhone simulator UUID
          SIM_UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' in runtime or 'iphone' in runtime.lower():
                  for d in devices:
                      if d.get('isAvailable') and 'iPhone' in d.get('name',''):
                          print(d['udid'])
                          sys.exit(0)
          " 2>/dev/null)

          if [ -z "$SIM_UDID" ]; then
            echo "ERROR: No iPhone simulator found!"
            xcrun simctl list devices available
            exit 1
          fi

          SIM_NAME=$(xcrun simctl list devices available | grep "$SIM_UDID" | sed -E 's/^[[:space:]]*//' | sed -E 's/ \(.*//') 
          echo "Selected Simulator: $SIM_NAME ($SIM_UDID)"
          echo "SIM_UDID=$SIM_UDID" >> $GITHUB_OUTPUT
          echo "SIM_NAME=$SIM_NAME" >> $GITHUB_OUTPUT

      - name: List Project Info
        run: |
          echo "=== Project Schemes & Targets ==="
          xcodebuild -project WebDriverAgent.xcodeproj -list

      - name: Build WebDriverAgent Runner
        run: |
          SIM_UDID="${{ steps.setup.outputs.SIM_UDID }}"
          echo "=== Building with Simulator ID: $SIM_UDID ==="

          xcodebuild clean build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "id=$SIM_UDID" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee build_output.log

      - name: Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-log
          path: build_output.log

      - name: Locate and Package Build Products
        run: |
          SCHEME="WebDriverAgentRunner"

          echo "=== All .app bundles ==="
          find build -name "*.app" -type d

          echo ""
          echo "=== Finding Runner App ==="
          RUNNER_APP=$(find build -name "${SCHEME}-Runner.app" -type d | head -1)

          if [ -z "$RUNNER_APP" ]; then
            echo "ERROR: ${SCHEME}-Runner.app not found!"
            find build/Build/Products -maxdepth 3 -type d 2>/dev/null || true
            exit 1
          fi

          echo "Found: $RUNNER_APP"
          WD=$(dirname "$RUNNER_APP")
          APP_NAME=$(basename "$RUNNER_APP")

          # Show binary architecture
          echo ""
          echo "=== Binary Info ==="
          MAIN_BIN=$(find "$RUNNER_APP" -name "${SCHEME}-Runner" -not -path "*.dSYM*" -type f | head -1)
          if [ -n "$MAIN_BIN" ]; then
            file "$MAIN_BIN"
            lipo -info "$MAIN_BIN" 2>/dev/null || true
          fi

          # Remove unnecessary XCTest frameworks (per Appium build-real.sh)
          echo ""
          echo "=== Stripping unnecessary frameworks ==="
          find "$RUNNER_APP/Frameworks" -name "XC*.framework" -type d -exec rm -rf {} + 2>/dev/null || true
          rm -rf "$RUNNER_APP/Frameworks/Testing.framework" 2>/dev/null || true
          rm -f "$RUNNER_APP/Frameworks/libXCTestSwiftSupport.dylib" 2>/dev/null || true

          # Create ZIP
          echo ""
          echo "=== Creating ZIP ==="
          cd "$WD"
          zip -qr "$GITHUB_WORKSPACE/WebDriverAgentRunner-Runner.zip" "$APP_NAME"
          cd "$GITHUB_WORKSPACE"

          # Create IPA
          echo "=== Creating IPA ==="
          mkdir -p Payload
          cp -r "$RUNNER_APP" Payload/
          zip -qr WebDriverAgentRunner.ipa Payload/

          echo ""
          echo "=== Output Files ==="
          ls -lh WebDriverAgentRunner-Runner.zip
          ls -lh WebDriverAgentRunner.ipa

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-Runner-ZIP
          path: WebDriverAgentRunner-Runner.zip
          if-no-files-found: error

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-IPA
          path: WebDriverAgentRunner.ipa
          if-no-files-found: error
